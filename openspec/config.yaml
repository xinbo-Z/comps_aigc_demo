# openspec/config.yaml
schema: spec-driven
context: |
  语言：中文（简体）
  所有产出物（proposal、specs、design、tasks）必须用简体中文撰写。
  技术术语、代码示例、文件路径、命令名称保持英文原文。

  Tech stack: React 19, TypeScript 5.x, Ant Design 5, Tailwind CSS 4
  Build tool: Vite
  Testing: Vitest + React Testing Library
  State management: useState/useContext for simple, Zustand for complex

rules:
  proposal:
    - 用中文撰写，包含回滚方案
    - 标明受影响的组件和路由
  specs:
    - 用中文撰写，使用 Given/When/Then 格式编写场景
    - 覆盖正常路径和边界情况
  design:
    - 用中文撰写，包含组件层级图
    - 说明状态管理方案
  tasks:
    - 用中文撰写，按组件或功能分组
    - 每组任务包含验证步骤
